<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rift Outlast</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="game-canvas" width="1280" height="720"></canvas>
      <div id="hud" class="panel top-left">
        <div class="hud-row">
          <span>Health</span>
          <div class="bar"><div id="health-fill" class="bar-fill health"></div></div>
          <span id="health-text">0 / 0</span>
        </div>
        <div class="hud-row">
          <span>XP</span>
          <div class="bar"><div id="xp-fill" class="bar-fill xp"></div></div>
          <span id="xp-text">Lv.1</span>
        </div>
        <div class="hud-meta">
          <div>Level <strong id="level-text">1</strong></div>
          <div>Time <strong id="time-text">00:00</strong></div>
          <div>Kills <strong id="kills-text">0</strong></div>
          <div>Best <strong id="record-text">0</strong></div>
        </div>
      </div>
      <div id="build-panel" class="panel top-right">
        <h3>Current Build</h3>
        <div class="build-columns">
          <div><h4>Weapons</h4><ul id="weapon-list"></ul></div>
          <div><h4>Perks</h4><ul id="passive-list"></ul></div>
        </div>
        <div class="buff-panel">
          <h4>Buffs</h4>
          <ul id="buff-list"></ul>
        </div>
      </div>
      <div id="status-line" class="panel bottom-center">
        <span>WASD Or Arrows To Move</span>
        <span>Click Cards To Pick Upgrades</span>
        <span>Esc To Pause</span>
      </div>
      <div id="overlay-root"></div>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
